name: Validate skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify skills CLI discovers all skills
        run: npx --yes skills@latest add . --list -y

      - name: Validate skills.sh.json parses
        run: |
          python3 -c "
          import json, sys
          with open('skills.sh.json') as f:
              data = json.load(f)
          names = set()
          for g in data.get('groupings', []):
              for s in g.get('skills', []):
                  if s in names:
                      sys.exit(f'duplicate skill in groupings: {s}')
                  names.add(s)
          print(f'OK: {len(names)} grouped skills')
          "
